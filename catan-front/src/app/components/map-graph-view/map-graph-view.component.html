<div class="page">
  <app-map-sidebar
    [nowPlayingSeats]="facade.nowPlayingSeats"
    [nowPlayingSeat]="facade.nowPlayingSeatEffective()"
    [nowPlayingSeatLocked]="facade.nowPlayingSeatChoiceLocked()"
    [nowPlayingCaption]="facade.nowPlayingCaption()"
    [heatmapOn]="facade.heatmapOn()"
    [playersBySeat]="facade.playersBySeat()"
    [playersByOverall]="facade.playersByOverall()"
    [resourceOnMap]="facade.resourceOnMap()"
    [generateMapLoading]="facade.generateMapLoading()"
    [generateMapFailed]="facade.generateMapFailed()"
    [mapGenerated]="facade.mapGenerated()"
    [gameStarted]="facade.gameStarted()"
    [generateMapDisabled]="facade.generateMapDisabled()"
    [startGameDisabled]="facade.startGameDisabled()"
    (nowPlayingSeatChange)="facade.setNowPlayingSeat($event)"
    (heatmapToggle)="facade.toggleHeatmap()"
    (generateMap)="facade.generateMap($event)"
    (startGame)="facade.startGame()"
    (abortGame)="facade.confirmAbortGame()"
  />

  <div class="map-stage">
    <svg class="svg" [attr.viewBox]="facade.mapViewBox" preserveAspectRatio="xMidYMid meet">
      <defs>
        <linearGradient id="sea-fill" x1="0%" y1="100%" x2="100%" y2="0%">
          <stop offset="0%" stop-color="#293941" />
          <stop offset="50%" stop-color="#344854" />
          <stop offset="100%" stop-color="#232f37" />
        </linearGradient>

        <pattern id="hex-fill-wood" width="14" height="14" patternUnits="userSpaceOnUse">
          <rect width="14" height="14" fill="#3d5c4f" />
        </pattern>
        <pattern id="hex-fill-brick" width="14" height="14" patternUnits="userSpaceOnUse">
          <rect width="14" height="14" fill="#8f675c" />
        </pattern>
        <pattern id="hex-fill-sheep" width="14" height="14" patternUnits="userSpaceOnUse">
          <rect width="14" height="14" fill="#5e7a62" />
        </pattern>
        <pattern id="hex-fill-wheat" width="14" height="14" patternUnits="userSpaceOnUse">
          <rect width="14" height="14" fill="#9c8f52" />
        </pattern>
        <pattern id="hex-fill-ore" width="14" height="14" patternUnits="userSpaceOnUse">
          <rect width="14" height="14" fill="#6f767e" />
        </pattern>
        <pattern id="hex-fill-desert" width="14" height="14" patternUnits="userSpaceOnUse">
          <rect width="14" height="14" fill="#a68f6b" />
        </pattern>
      </defs>

      <rect class="sea" x="-2000" y="-2000" width="4000" height="4000" fill="url(#sea-fill)" />

      @for (h of facade.hexViews(); track h.id) {
        <g
          class="hex-cell"
          [attr.transform]="'translate(' + h.x + ',' + h.y + ')'"
          (click)="facade.onHexClick(h.id)"
        >
          <polygon
            class="hex"
            [class.hex--lit]="h.lit"
            [class.hex--selected]="h.selected"
            [class.hex--vertex-linked]="h.vertexLinked"
            [attr.points]="facade.hexPolygonPoints"
            [attr.fill]="h.fill"
          />
          @for (e of h.edges; track e.num) {
            <line
              class="hex-edge-guide"
              [attr.x1]="e.x1"
              [attr.y1]="e.y1"
              [attr.x2]="e.x2"
              [attr.y2]="e.y2"
              (click)="facade.onEdgeClick(h.fieldNumber, e.num, $event)"
            />
          }
          @if (h.productionNumber !== null) {
            <g class="token">
              <circle class="token-chip" r="24" cx="0" cy="0" />
              <text class="token-num" [class.token-num--hot]="h.tokenHot" x="0" y="0" text-anchor="middle" dominant-baseline="middle">
                {{ h.productionNumber }}
              </text>
            </g>
          }
        </g>
      }

      @if (facade.heatmapOn()) {
        <g class="vertex-heat-layer">
          @for (v of facade.heatmapVertexMarkers(); track v.id) {
            <g
              class="vertex-heat-marker"
              [attr.transform]="'translate(' + v.x + ',' + v.y + ')'"
              (pointerenter)="facade.onVertexHeatPointerEnter(v.id, $event)"
              (pointermove)="facade.onVertexHeatPointerMove(v.id, $event)"
              (pointerleave)="facade.onVertexHeatPointerLeave()"
              (click)="facade.onVertexClick(v.id, $event)"
            >
              <circle
                class="vertex-heat-dot"
                [class.vertex-heat-dot--ring]="v.ring"
                [class.vertex-heat-dot--selected]="v.selected"
                cx="0"
                cy="0"
                r="18"
                [attr.fill]="v.fill"
              />
              <text
                class="vertex-heat-grade"
                x="0"
                y="0"
                text-anchor="middle"
                dominant-baseline="middle"
                pointer-events="none"
              >
                {{ v.grade }}
              </text>
            </g>
          }
        </g>
      }

      <g class="player-pieces">
        @for (r of facade.playerPieces().roads; track r.v1 + '-' + r.v2) {
          <line
            class="player-road"
            [class.player-road--0]="r.seat === 0"
            [class.player-road--1]="r.seat === 1"
            [class.player-road--2]="r.seat === 2"
            [attr.x1]="r.x1"
            [attr.y1]="r.y1"
            [attr.x2]="r.x2"
            [attr.y2]="r.y2"
          />
        }
        @for (s of facade.playerPieces().settlements; track s.vertexId) {
          <g
            class="player-settlement"
            [class.player-settlement--0]="s.seat === 0"
            [class.player-settlement--1]="s.seat === 1"
            [class.player-settlement--2]="s.seat === 2"
            [attr.transform]="'translate(' + s.x + ',' + s.y + ')'"
          >
            <path class="player-settlement__house" d="M 0,-12 L 11,3 L 7,3 L 7,12 L -7,12 L -7,3 L -11,3 Z" />
          </g>
        }
      </g>
    </svg>
  </div>
  @if (facade.vertexHeatTooltipView(); as tip) {
    <aside
      class="vertex-heat-tooltip"
      [class.vertex-heat-tooltip--above]="!tip.placeBelow"
      [class.vertex-heat-tooltip--below]="tip.placeBelow"
      [style.left.px]="tip.screenX"
      [style.top.px]="tip.screenY"
      role="tooltip"
    >
      <header class="vertex-heat-tooltip__heading">Heuristic values</header>
      <dl class="vertex-heat-tooltip__dl">
        @for (row of tip.rows; track row.label) {
          <dt class="vertex-heat-tooltip__label">{{ row.label }}</dt>
          <dd class="vertex-heat-tooltip__value">
            <output class="vertex-heat-tooltip__res">{{ row.value }}</output>
          </dd>
        }
      </dl>
    </aside>
  }
</div>
